version: "3.9"

services:

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mediakit
    ports:
      - "5432:5432"      # Exposed so you can connect with a DB viewer like TablePlus
    volumes:
      - postgres_data:/var/lib/postgresql/data   # Data persists between restarts

  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env        # Reads all your API keys from .env
    depends_on:
      - postgres              # Won't start until postgres is ready
    volumes:
      - ./backend:/app        # Hot reload — code changes reflect immediately
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
